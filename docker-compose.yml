services:
  db:
    image: mysql:8.0
    container_name: litmarket_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-lm_db}
      MYSQL_USER: ${DB_USERNAME:-mysql}
      MYSQL_PASSWORD: ${DB_PASSWORD:-litmarket}
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    networks:
      - litmarket_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${DB_USERNAME:-mysql}", "-p${DB_PASSWORD:-litmarket}"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  db_data:
    name: litmarket_db_data

networks:
  litmarket_network:
    name: litmarket_network
    driver: bridge
